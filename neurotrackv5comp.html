/* ════════════════════════════════════════════════════════════════════
   VIEW: SESSION (GAME RUNNER)
   ════════════════════════════════════════════════════════════════════ */
const TASKS = [
  { id:'memory', name:'Pattern Memory', icon:'🧠' },
  { id:'reaction', name:'Speed Test', icon:'⚡' },
  { id:'delayedRecall', name:'Word Recall', icon:'📝' },
  { id:'executive', name:'Stroop Challenge', icon:'🎨' },
  { id:'trails', name:'Trail Making', icon:'🔗' },
  { id:'gonogo', name:'Go / No-Go', icon:'🎯' },
  { id:'digitSymbol', name:'Symbol Match', icon:'🔢' },
  { id:'fluency', name:'Category Fluency', icon:'💬' },
];

function renderSession(app, patient) {
  if (!patient) { navigate('list'); return; }
  if (!state.session) {
    state.session = { taskIdx: -1, scores: {}, gameState: null };
  }
  const ss = state.session;
  const sesNum = patient.sessions.length + 1;

  let html = `<button class="back-link" onclick="navigate('detail','${patient.id}')">← Cancel Session</button>
    <div class="text-center mb-16"><div style="font-size:12px;color:var(--dim);letter-spacing:2px">SESSION ${sesNum} · ${patient.name.toUpperCase()}</div></div>`;

  // Task dots
  html += `<div class="task-dots">`;
  for (let i = 0; i < TASKS.length; i++) {
    const w = i === ss.taskIdx ? 28 : 10;
    const bg = i < ss.taskIdx ? DOMAIN[TASKS[i].id].color : i === ss.taskIdx ? 'var(--accent)' : 'rgba(255,255,255,0.06)';
    const shadow = i === ss.taskIdx ? '0 0 12px var(--accent-glow)' : 'none';
    html += `<div class="task-dot" style="width:${w}px;background:${bg};box-shadow:${shadow}"></div>`;
  }
  html += `</div>`;

  html += `<div class="card" style="max-width:400px;margin:0 auto" id="game-area"></div>`;
  app.innerHTML = html;

  if (ss.taskIdx < 0) renderGameIntro(patient);
  else if (ss.taskIdx < TASKS.length) startGame(TASKS[ss.taskIdx].id, patient);
  else renderSessionResults(patient);
}

function renderGameIntro(patient) {
  const area = document.getElementById('game-area');
  if (!area) return;
  const sesNum = patient.sessions.length + 1;
  area.innerHTML = `<div class="text-center">
    <div style="font-size:13px;color:var(--dim);letter-spacing:2px;margin-bottom:6px">SESSION ${sesNum}</div>
    <div style="font-size:20px;font-weight:700;margin-bottom:6px">Cognitive Assessment Battery</div>
    <div style="font-size:13px;color:var(--dim);margin-bottom:20px">8 tasks · ~10 minutes</div>
    ${TASKS.map((t,i) => `<div style="display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:14px;background:rgba(79,140,255,0.04);border:1px solid rgba(79,140,255,0.1);margin-bottom:8px;text-align:left">
      <div style="font-size:24px">${t.icon}</div>
      <div><div style="font-size:14px;font-weight:600">${t.name}</div></div>
      <div style="margin-left:auto;font-size:11px;color:var(--faint)">#${i+1}</div>
    </div>`).join('')}
    <button class="btn btn-cta mt-16" onclick="state.session.taskIdx=0;navigate('session','${patient.id}')">Begin Assessment</button>
  </div>`;
}

function renderSessionResults(patient) {
  const area = document.getElementById('game-area');
  if (!area) return;
  const ss = state.session;
  const comp = computeComposite(ss.scores);
  area.innerHTML = `<div class="text-center">
    <div style="font-size:40px;margin-bottom:12px">✨</div>
    <div style="font-size:18px;font-weight:700;margin-bottom:4px">Session Complete!</div>
    <div style="font-size:12px;color:var(--dim);margin-bottom:20px">Saving to database...</div>
    <div style="font-size:48px;font-weight:900;color:var(--accent);margin-bottom:16px">${comp}</div>
    <div class="grid-2">
      ${TASKS.map(t => `<div class="score-mini"><div class="score-mini-label" style="color:${DOMAIN[t.id].color}">${t.icon} ${t.name}</div><div class="score-mini-val">${ss.scores[t.id]!=null?ss.scores[t.id].toFixed(1):'—'}</div></div>`).join('')}
    </div>
  </div>`;

  // Save (async — encrypted)
  const result = { ...ss.scores, composite: comp, date: new Date().toISOString().slice(0,10), time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}), session: patient.sessions.length+1 };
  const updated = { ...patient, sessions: [...patient.sessions, result] };
  DB.save(patient.id, updated).then(() => {
    addAuditEntry('Session completed for ' + patient.name + ' — composite: ' + comp);
    setTimeout(() => navigate('detail', patient.id), 2800);
  });
}

/* Game routing handled by unified taskComplete in self-test module */

/* ════════════════════════════════════════════════════════════════════
   GAME ENGINES
   ════════════════════════════════════════════════════════════════════ */
function startGame(taskId, patient) {
  switch (taskId) {
    case 'memory': gameMemory(); break;
    case 'reaction': gameReaction(); break;
    case 'delayedRecall': gameRecall(); break;
    case 'executive': gameStroop(); break;
    case 'trails': gameTrails(); break;
    case 'gonogo': gameGoNogo(); break;
    case 'digitSymbol': gameDigitSymbol(); break;
    case 'fluency': gameFluency(); break;
  }
}

// ── PATTERN MEMORY ──
function gameMemory() {
  const area = document.getElementById('game-area');
  let phase='ready',seq=[],input=[],span=3,round=0,score=0,maxR=6,activeCell=-1,tmr=null;

  function genSeq(len){const s=[];while(s.length<len){const n=Math.floor(Math.random()*9);if(s[s.length-1]!==n)s.push(n);}return s;}

  function draw() {
    let fb = '';
    if (phase==='showing') fb='<div style="color:var(--warning)">Memorise the pattern...</div>';
    else if (phase==='input') fb=`<div style="color:var(--dim)">Tap ${seq.length-input.length} more</div>`;

    area.innerHTML = `<div class="text-center">
      <div class="flex-between mb-8"><span style="font-size:12px;color:var(--dim);letter-spacing:1px">ROUND ${Math.min(round+1,maxR)}/${maxR}</span><span style="font-size:12px;color:var(--accent);font-weight:600">SPAN: ${span}</span></div>
      ${progress(round,maxR)}
      ${phase==='ready'?`<div style="padding:28px 0"><div style="font-size:44px;margin-bottom:14px">🧠</div><div style="font-size:16px;font-weight:600;margin-bottom:6px">Pattern Memory</div><div style="font-size:13px;color:var(--dim);margin-bottom:24px;line-height:1.6">Watch the cells light up, then tap them<br>in the same order.</div><button class="btn" id="mem-start">Start Game</button></div>`
      :`<div class="game-grid" id="mem-grid">${Array.from({length:9}).map((_,i)=>`<button class="game-cell${activeCell===i?' active':''}${phase==='showing'&&activeCell!==i?' dim':''}" data-idx="${i}"></button>`).join('')}</div><div style="margin-top:20px;font-size:14px;font-weight:500;height:22px">${fb}</div>`}
    </div>`;

    if (phase==='ready') document.getElementById('mem-start')?.addEventListener('click', startRound);
    if (phase==='input') {
      document.querySelectorAll('.game-cell').forEach(el => {
        el.addEventListener('click', () => handleTap(parseInt(el.dataset.idx)));
      });
    }
  }

  function startRound() {
    seq=genSeq(span);input=[];phase='blank';activeCell=-1;
    // Show all cells blank with "Get ready..." message
    area.innerHTML = `<div class="text-center">
      <div class="flex-between mb-8"><span style="font-size:12px;color:var(--dim);letter-spacing:1px">ROUND ${Math.min(round+1,maxR)}/${maxR}</span><span style="font-size:12px;color:var(--accent);font-weight:600">SPAN: ${span}</span></div>
      ${progress(round,maxR)}
      <div class="game-grid">${Array.from({length:9}).map(()=>`<button class="game-cell" disabled></button>`).join('')}</div>
      <div style="margin-top:20px;font-size:14px;font-weight:500;height:22px;color:var(--dim)">Get ready...</div>
    </div>`;
    // Brief blank pause, then start showing the sequence
    tmr=setTimeout(()=>{
      phase='showing';
      let i=0;
      function show(){
        if(i<seq.length){activeCell=seq[i];draw();tmr=setTimeout(()=>{activeCell=-1;draw();i++;tmr=setTimeout(show,250);},550);}
        else{phase='input';draw();}
      }
      show();
    },800);
  }

  function handleTap(idx) {
    if(phase!=='input')return;
    input.push(idx);activeCell=idx;draw();setTimeout(()=>{activeCell=-1;
      if(input.length===seq.length){
        const ok=input.every((v,i)=>v===seq[i]);
        const pts=ok?Math.min(100,40+span*10):Math.max(10,25-(span-3)*3);
        score+=pts;round++;
        if(ok&&span<8)span++;if(!ok&&span>3)span--;
        if(round>=maxR){taskComplete('memory',Math.min(100,Math.max(0,Math.round(score/maxR))));}
        else setTimeout(startRound,800);
      } else draw();
    },180);
  }

  draw();
}

// ── REACTION SPEED ──
function gameReaction() {
  const area = document.getElementById('game-area');
  let phase='ready',times=[],startT=0,lastRT=null,round=0,maxR=10,tmr=null;

  function draw() {
    const avg=times.length>0?Math.round(times.reduce((a,b)=>a+b,0)/times.length):null;
    const bgMap={ready:'var(--surface)',wait:'rgba(248,113,113,0.04)',go:'rgba(52,211,153,0.1)',early:'rgba(251,191,36,0.06)',result:'var(--surface)'};

    area.innerHTML = `<div class="text-center">
      <div class="flex-between mb-8"><span style="font-size:12px;color:var(--dim);letter-spacing:1px">TRIAL ${Math.min(round+1,maxR)}/${maxR}</span>${avg?`<span style="font-size:12px;color:var(--accent);font-weight:600">AVG: ${avg}ms</span>`:''}</div>
      ${progress(round,maxR,'var(--warning)')}
      <div class="react-box mt-16" id="react-box" style="background:${bgMap[phase]||'var(--surface)'}">
        ${phase==='ready'?`<div style="font-size:40px">⚡</div><div style="font-size:16px;font-weight:600">Processing Speed</div><div style="font-size:13px;color:var(--dim);margin-top:4px">Tap when the screen turns green.</div><div style="margin-top:14px"><span class="btn btn-sm">Start</span></div>`
        :phase==='wait'?`<div style="font-size:40px;opacity:0.6">🔴</div><div style="font-size:15px;color:var(--danger);font-weight:600">Wait for green...</div>`
        :phase==='go'?`<div style="font-size:40px">🟢</div><div style="font-size:24px;font-weight:800;color:var(--success);letter-spacing:2px">TAP NOW!</div>`
        :phase==='early'?`<div style="font-size:40px">⚠️</div><div style="font-size:14px;color:var(--warning);font-weight:600">Too early!</div>`
        :`<div style="font-size:14px;color:var(--dim)">Reaction Time</div><div style="font-size:36px;font-weight:800;color:${lastRT<300?'var(--success)':lastRT<500?'var(--warning)':'var(--danger)'}">${lastRT}ms</div>`}
      </div>
      ${times.length>1?`<div style="display:flex;gap:4px;justify-content:center;margin-top:14px;height:30px;align-items:flex-end">${times.map(t=>{const h=Math.max(6,Math.min(30,(600-t)/600*30));const c=t<300?'var(--success)':t<450?'var(--warning)':'var(--danger)';return`<div style="width:8px;height:${h}px;border-radius:2px;background:${c};opacity:0.7"></div>`;}).join('')}</div>`:''}
    </div>`;

    document.getElementById('react-box')?.addEventListener('click', handleTap);
  }

  function startTrial() {
    phase='wait';lastRT=null;draw();
    const delay=1200+Math.random()*3500;
    tmr=setTimeout(()=>{phase='go';startT=Date.now();draw();},delay);
  }

  function handleTap() {
    if(phase==='ready'){startTrial();return;}
    if(phase==='wait'){clearTimeout(tmr);phase='early';draw();setTimeout(startTrial,1200);return;}
    if(phase==='go'){
      const rt=Date.now()-startT;lastRT=rt;times.push(rt);round++;
      if(times.length>=maxR){
        const avg=times.reduce((a,b)=>a+b,0)/times.length;
        const s=Math.max(0,Math.min(100,100-(avg-180)/4.5));
        const mean=avg,std=Math.sqrt(times.reduce((a,v)=>a+(v-mean)**2,0)/times.length);
        const cv=std/mean,pen=Math.min(15,cv*40);
        phase='result';draw();
        setTimeout(()=>taskComplete('reaction',Math.round(Math.max(0,s-pen))),700);
      } else{phase='result';draw();setTimeout(startTrial,1000);}
    }
  }

  draw();
}

// ── DELAYED RECALL ──
function gameRecall() {
  const area = document.getElementById('game-area');
  const pool=["OCEAN","BRIDGE","FOREST","CANDLE","RIVER","GUITAR","PALACE","SUNSET","EAGLE","GARDEN","CRYSTAL","THUNDER","MARBLE","SHADOW","VELVET","LANTERN","ANCHOR","COMPASS","FEATHER","MIRROR","VOLCANO","SILVER","AUTUMN","HARVEST"];
  const words=[...pool].sort(()=>Math.random()-0.5).slice(0,8);
  let phase='ready',timer=25,dTimer=15,rTimer=40,revIdx=0,mathPts=0,mathQ=null,intv=null;

  function genMath(){const a=Math.floor(Math.random()*20)+10,b=Math.floor(Math.random()*15)+5,op=Math.random()>0.5?'+':'-';return{a,b,op,answer:op==='+'?a+b:a-b};}

  // Only update timer text and progress bar without rebuilding the whole DOM
  function updateTimer(id, value, max, color, warnAt) {
    const timerEl = document.getElementById(id+'-timer');
    const progEl = document.getElementById(id+'-prog');
    if (timerEl) {
      timerEl.textContent = value + 's';
      timerEl.style.color = (warnAt && value <= warnAt) ? 'var(--danger)' : color;
    }
    if (progEl) {
      progEl.style.width = Math.min(100, ((max - value) / max) * 100) + '%';
    }
  }

  function drawPhase() {
    if(phase==='ready'){
      area.innerHTML=`<div class="text-center" style="padding:28px 0"><div style="font-size:44px;margin-bottom:14px">📝</div><div style="font-size:16px;font-weight:600;margin-bottom:6px">Delayed Recall</div><div style="font-size:13px;color:var(--dim);margin-bottom:24px;line-height:1.6">Memorise 8 words → solve maths → recall words.</div><button class="btn" id="recall-start">Start Game</button></div>`;
      document.getElementById('recall-start')?.addEventListener('click',()=>{phase='memorize';revIdx=0;startMemTimer();});
    } else if(phase==='memorize'){
      area.innerHTML=`<div class="text-center">
        <div class="flex-between mb-12"><span style="font-size:12px;color:var(--dim);letter-spacing:1px">MEMORISE</span><span id="mem-timer" style="font-size:13px;color:var(--accent);font-weight:700">${timer}s</span></div>
        <div class="progress"><div class="progress-fill" id="mem-prog" style="width:${((25-timer)/25)*100}%;background:var(--success)"></div></div>
        <div class="flex-wrap mt-16" id="word-grid" style="justify-content:center;max-width:360px;margin:16px auto">
          ${words.map((w,i)=>`<div class="word-chip" id="wc-${i}" style="background:${i<revIdx?'rgba(52,211,153,0.08)':'transparent'};border:1px solid ${i<revIdx?'rgba(52,211,153,0.2)':'var(--border)'};color:${i<revIdx?'var(--success)':'transparent'};opacity:${i<revIdx?1:0};transform:translateY(${i<revIdx?0:8}px)">${w}</div>`).join('')}
        </div>
      </div>`;
    } else if(phase==='distract'){
      area.innerHTML=`<div class="text-center">
        <div class="flex-between mb-12"><span style="font-size:12px;color:var(--dim);letter-spacing:1px">DISTRACTION</span><span id="dist-timer" style="font-size:13px;color:var(--warning);font-weight:700">${dTimer}s</span></div>
        <div class="progress"><div class="progress-fill" id="dist-prog" style="width:${((15-dTimer)/15)*100}%;background:var(--warning)"></div></div>
        <div style="padding:20px 0">
          <div style="font-size:11px;color:var(--dim);margin-bottom:14px">Solve to prevent rehearsal</div>
          <div style="font-size:28px;font-weight:800;margin-bottom:14px" id="math-question">${mathQ?mathQ.a+' '+mathQ.op+' '+mathQ.b+' = ?':''}</div>
          <div style="display:flex;gap:8px;max-width:200px;margin:0 auto">
            <input class="input" type="number" id="math-ans" style="text-align:center;font-size:18px;font-weight:700" autofocus>
            <button class="btn btn-sm" id="math-go">→</button>
          </div>
          <div style="font-size:12px;color:var(--success);margin-top:10px" id="math-score">${mathPts} correct</div>
        </div>
      </div>`;
      document.getElementById('math-go')?.addEventListener('click',checkMath);
      document.getElementById('math-ans')?.addEventListener('keydown',e=>{if(e.key==='Enter')checkMath();});
      document.getElementById('math-ans')?.focus();
    } else if(phase==='recall'){
      area.innerHTML=`<div class="text-center">
        <div class="flex-between mb-12"><span style="font-size:12px;color:var(--dim);letter-spacing:1px">RECALL</span><span id="rec-timer" style="font-size:13px;color:var(--accent);font-weight:700">${rTimer}s</span></div>
        <div class="progress"><div class="progress-fill" id="rec-prog" style="width:0%;background:var(--accent)"></div></div>
        <div style="font-size:13px;color:var(--dim);margin:12px 0">Type all the words you remember</div>
        <textarea class="input" id="recall-text" style="height:100px;resize:none;font-size:15px;border-radius:14px" placeholder="Type words separated by spaces..." autofocus></textarea>
        <div class="mt-12"><button class="btn" id="recall-submit">Submit Recall</button></div>
      </div>`;
      document.getElementById('recall-submit')?.addEventListener('click',submitRecall);
      document.getElementById('recall-text')?.focus();
    }
  }

  function revealWord(idx) {
    const el = document.getElementById('wc-'+idx);
    if (el) {
      el.style.background = 'rgba(52,211,153,0.08)';
      el.style.borderColor = 'rgba(52,211,153,0.2)';
      el.style.color = 'var(--success)';
      el.style.opacity = '1';
      el.style.transform = 'translateY(0)';
    }
  }

  function startMemTimer(){
    drawPhase();
    intv=setInterval(()=>{
      if(phase==='memorize'){
        if(revIdx<words.length){revealWord(revIdx);revIdx++;}
        timer--;
        if(timer<=0){clearInterval(intv);phase='distract';mathQ=genMath();startDistractTimer();}
        else updateTimer('mem',timer,25,'var(--accent)',5);
      }
    },1000);
  }

  function startDistractTimer(){
    drawPhase();
    intv=setInterval(()=>{
      dTimer--;
      if(dTimer<=0){clearInterval(intv);phase='recall';startRecallTimer();}
      else updateTimer('dist',dTimer,15,'var(--warning)',null);
    },1000);
  }

  function startRecallTimer(){
    drawPhase();
    intv=setInterval(()=>{
      rTimer--;
      if(rTimer<=0){clearInterval(intv);submitRecall();}
      else updateTimer('rec',rTimer,40,'var(--accent)',10);
    },1000);
  }

  function checkMath(){
    const ansEl = document.getElementById('math-ans');
    const ans=parseInt(ansEl?.value);
    if(ans===mathQ.answer)mathPts++;
    mathQ=genMath();
    // Update only the question and score, not the whole page
    const qEl = document.getElementById('math-question');
    const sEl = document.getElementById('math-score');
    if(qEl) qEl.textContent = mathQ.a+' '+mathQ.op+' '+mathQ.b+' = ?';
    if(sEl) sEl.textContent = mathPts+' correct';
    if(ansEl){ansEl.value='';ansEl.focus();}
  }

  function submitRecall(){
    clearInterval(intv);
    const text=(document.getElementById('recall-text')?.value||'').toUpperCase();
    const recalled=text.split(/[\s,;.\n]+/).filter(Boolean);
    const uniq=new Set(recalled);
    const correct=[...uniq].filter(w=>words.includes(w)).length;
    const intrusions=[...uniq].filter(w=>!words.includes(w)).length;
    let s=(correct/words.length)*100;s=Math.max(0,s-intrusions*3);
    const middle=words.slice(2,-2),mr=[...uniq].filter(w=>middle.includes(w)).length;
    if(middle.length>0)s+=mr/middle.length*8;
    taskComplete('delayedRecall',Math.round(Math.min(100,Math.max(0,s))));
  }

  drawPhase();
}

// ── STROOP ──
function gameStroop() {
  const area = document.getElementById('game-area');
  const colors=['#ef4444','#3b82f6','#22c55e','#eab308'];
  const names=['RED','BLUE','GREEN','YELLOW'];
  let phase='ready',trial=null,round=0,score=0,maxR=14,feedback=null,startT=0;

  function genTrial(){const ti=Math.floor(Math.random()*4),con=Math.random()>0.6,ci=con?ti:((ti+1+Math.floor(Math.random()*3))%4);return{text:names[ti],color:colors[ci],idx:ci,con};}

  function draw(){
    if(phase==='ready'){
      area.innerHTML=`<div class="text-center" style="padding:28px 0"><div style="font-size:44px;margin-bottom:14px">🎨</div><div style="font-size:16px;font-weight:600;margin-bottom:6px">Stroop Challenge</div><div style="font-size:13px;color:var(--dim);margin-bottom:24px;line-height:1.6">Tap the <strong style="color:var(--text)">INK colour</strong>, ignore the word.</div><button class="btn" id="stroop-start">Start Game</button></div>`;
      document.getElementById('stroop-start')?.addEventListener('click',()=>{phase='play';trial=genTrial();startT=Date.now();draw();});
    } else {
      area.innerHTML=`<div class="text-center">
        <div class="flex-between mb-8"><span style="font-size:12px;color:var(--dim);letter-spacing:1px">${round+1}/${maxR}</span><span style="font-size:12px;color:var(--danger);font-weight:600">TAP THE INK COLOUR</span></div>
        ${progress(round,maxR,'var(--danger)')}
        ${trial?`<div style="font-size:52px;font-weight:900;color:${trial.color};margin:28px 0 32px;letter-spacing:6px;user-select:none;text-shadow:${feedback===true?'0 0 30px rgba(52,211,153,0.4)':feedback===false?'0 0 30px rgba(248,113,113,0.4)':'none'}">${trial.text}</div>`:''}
        <div style="display:flex;gap:12px;justify-content:center">
          ${colors.map((c,i)=>`<button class="stroop-btn" style="background:${c};box-shadow:0 4px 12px ${c}30" data-idx="${i}"></button>`).join('')}
        </div>
        <div style="margin-top:14px;font-size:13px;font-weight:600;height:20px;color:${feedback===true?'var(--success)':feedback===false?'var(--danger)':'transparent'}">${feedback===true?'✓ Correct!':feedback===false?'✗ Wrong!':'·'}</div>
      </div>`;
      document.querySelectorAll('.stroop-btn').forEach(el=>{
        el.addEventListener('click',()=>answer(parseInt(el.dataset.idx)));
      });
    }
  }

  function answer(idx){
    if(!trial||feedback!==null)return;
    const rt=Date.now()-startT,ok=idx===trial.idx;
    const bonus=!trial.con&&ok?15:0,pts=ok?Math.max(20,100-rt/8)+bonus:0;
    score+=pts;feedback=ok;round++;draw();
    if(round>=maxR){setTimeout(()=>taskComplete('executive',Math.min(100,Math.max(0,Math.round(score/maxR)))),600);}
    else setTimeout(()=>{trial=genTrial();feedback=null;startT=Date.now();draw();},700);
  }

  draw();
}

// ── TRAIL MAKING TEST (A & B) ──
// Part A: connect numbers in order. Part B: alternate numbers and letters (1-A-2-B...).
// Measures visual scanning, processing speed, and cognitive flexibility.
function gameTrails() {
  const area = document.getElementById('game-area');
  let phase='ready',part='A',startT=0,clicks=[],errors=0,timeA=0,timeB=0;

  function genNodes(partType) {
    const nodes=[];const count=partType==='A'?15:14;
    const positions=[];
    for(let i=0;i<count;i++){
      let x,y,ok;
      do{x=15+Math.random()*70;y=10+Math.random()*75;ok=true;
        for(const p of positions){if(Math.hypot(p.x-x,p.y-y)<14){ok=false;break;}}
      }while(!ok);
      positions.push({x,y});
      if(partType==='A') nodes.push({label:''+(i+1),x,y});
      else{const n=Math.floor(i/2)+1;const l=String.fromCharCode(65+Math.floor(i/2));nodes.push({label:i%2===0?''+n:l,x,y});}
    }
    return nodes;
  }

  let nodes=[],current=0;

  function draw(){
    if(phase==='ready'){
      area.innerHTML=`<div class="text-center" style="padding:28px 0"><div style="font-size:44px;margin-bottom:14px">🔗</div><div style="font-size:16px;font-weight:600;margin-bottom:6px">Trail Making Test</div><div style="font-size:13px;color:var(--dim);margin-bottom:24px;line-height:1.6">Part A: Tap numbers in order (1→2→3...)<br>Part B: Alternate numbers & letters (1→A→2→B...)</div><button class="btn" id="trails-start">Start Part A</button></div>`;
      document.getElementById('trails-start')?.addEventListener('click',()=>{part='A';nodes=genNodes('A');current=0;clicks=[];errors=0;phase='play';startT=Date.now();draw();});
    } else if(phase==='play'){
      const elapsed=((Date.now()-startT)/1000).toFixed(1);
      area.innerHTML=`<div>
        <div class="flex-between mb-8"><span style="font-size:12px;color:var(--dim);letter-spacing:1px">PART ${part}</span><span style="font-size:13px;color:var(--accent);font-weight:700">${elapsed}s</span></div>
        <div style="position:relative;width:100%;height:300px;background:var(--surface);border-radius:12px;overflow:hidden" id="trails-field">
          ${nodes.map((n,i)=>{
            const done=i<current;const active=i===current;
            return`<div onclick="trailTap(${i})" style="position:absolute;left:${n.x}%;top:${n.y}%;width:36px;height:36px;margin:-18px 0 0 -18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.15s;
              background:${done?'var(--success)':active?'var(--accent)':'var(--card)'};
              border:2px solid ${done?'var(--success)':active?'var(--accent)':'var(--border)'};
              color:${done||active?'#fff':'var(--text)'};
              opacity:${done?0.5:1};
              ${done?'transform:scale(0.8)':''}
            ">${n.label}</div>`;
          }).join('')}
        </div>
        <div style="margin-top:8px;font-size:12px;color:var(--dim);text-align:center">Next: <strong style="color:var(--text)">${nodes[current]?.label||'—'}</strong>${errors>0?' · Errors: '+errors:''}</div>
      </div>`;
    } else if(phase==='between'){
      area.innerHTML=`<div class="text-center" style="padding:28px 0">
        <div style="font-size:16px;font-weight:700;margin-bottom:6px">Part A Complete!</div>
        <div style="font-size:28px;font-weight:800;color:var(--accent);margin-bottom:16px">${(timeA/1000).toFixed(1)}s</div>
        <div style="font-size:13px;color:var(--dim);margin-bottom:20px">Now Part B: alternate numbers & letters<br>(1→A→2→B→3→C...)</div>
        <button class="btn" id="trails-b">Start Part B</button>
      </div>`;
      document.getElementById('trails-b')?.addEventListener('click',()=>{part='B';nodes=genNodes('B');current=0;clicks=[];errors=0;phase='play';startT=Date.now();draw();});
    }
  }

  window.trailTap=function(idx){
    if(phase!=='play')return;
    if(idx===current){current++;
      if(current>=nodes.length){
        if(part==='A'){timeA=Date.now()-startT;phase='between';draw();}
        else{timeB=Date.now()-startT;
          // Score: TMT B-A measures cognitive flexibility. Lower time = better.
          const speedA=Math.max(0,100-(timeA/1000-8)*3);
          const speedB=Math.max(0,100-(timeB/1000-12)*2.5);
          const flexibility=Math.max(0,100-((timeB-timeA)/1000)*4);
          const errorPen=errors*5;
          const score=Math.max(0,Math.min(100,Math.round((speedA*0.3+speedB*0.3+flexibility*0.4)-errorPen)));
          taskComplete('trails',score);
        }
      } else draw();
    } else{errors++;draw();}
  };

  draw();
}

// ── GO / NO-GO (Sustained Attention & Inhibitory Control) ──
// Green = tap (Go). Red = don't tap (No-Go). Measures sustained attention and impulse control.
function gameGoNogo() {
  const area = document.getElementById('game-area');
  let phase='ready',round=0,maxR=24,goCount=0,nogoCount=0,hits=0,falseAlarms=0,misses=0,correctRejects=0,rts=[],tmr=null,stimT=0,isGo=true,responded=false;

  function draw(){
    if(phase==='ready'){
      area.innerHTML=`<div class="text-center" style="padding:28px 0"><div style="font-size:44px;margin-bottom:14px">🎯</div><div style="font-size:16px;font-weight:600;margin-bottom:6px">Go / No-Go</div><div style="font-size:13px;color:var(--dim);margin-bottom:24px;line-height:1.6"><strong style="color:var(--success)">Green circle</strong> = Tap as fast as you can<br><strong style="color:var(--danger)">Red circle</strong> = Do NOT tap</div><button class="btn" id="gng-start">Start</button></div>`;
      document.getElementById('gng-start')?.addEventListener('click',()=>{phase='play';nextTrial();});
    }
  }

  function nextTrial(){
    if(round>=maxR){
      const hitRate=goCount>0?hits/goCount:0;
      const faRate=nogoCount>0?falseAlarms/nogoCount:0;
      const avgRT=rts.length>0?rts.reduce((a,b)=>a+b,0)/rts.length:999;
      const rtScore=Math.max(0,100-(avgRT-250)/4);
      const accScore=(hitRate-faRate)*100;
      const score=Math.max(0,Math.min(100,Math.round(rtScore*0.4+accScore*0.6)));
      taskComplete('gonogo',score);
      return;
    }
    isGo=Math.random()>0.3; // 70% go, 30% no-go
    if(isGo)goCount++;else nogoCount++;
    responded=false;round++;
    const bg=isGo?'rgba(46,232,165,0.15)':'rgba(255,107,107,0.15)';
    const circleColor=isGo?'var(--success)':'var(--danger)';
    area.innerHTML=`<div class="text-center">
      <div class="flex-between mb-8"><span style="font-size:12px;color:var(--dim);letter-spacing:1px">${round}/${maxR}</span><span style="font-size:12px;color:var(--dim)">${isGo?'GO':'NO-GO'}</span></div>
      ${progress(round,maxR,'var(--cyan)')}
      <div id="gng-target" onclick="gngTap()" style="width:120px;height:120px;border-radius:50%;margin:40px auto;background:${circleColor};cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px ${circleColor}40;transition:transform 0.1s;user-select:none;-webkit-user-select:none">
        <span style="font-size:32px;color:#fff;font-weight:800;pointer-events:none;user-select:none">${isGo?'GO':'✕'}</span>
      </div>
      <div style="font-size:12px;color:var(--dim)">${isGo?'Tap the circle!':'Don\'t tap!'}</div>
    </div>`;
    stimT=Date.now();
    tmr=setTimeout(()=>{if(!responded){if(isGo)misses++;else correctRejects++;}nextTrial();},1500);
  }

  window.gngTap=function(){
    if(responded)return;responded=true;clearTimeout(tmr);
    const rt=Date.now()-stimT;
    if(isGo){hits++;rts.push(rt);}
    else{falseAlarms++;}
    setTimeout(nextTrial,400);
  };

  draw();
}

// ── DIGIT SYMBOL SUBSTITUTION (Processing Speed + Visual Scanning) ──
// Match symbols to digits using a key. Standard neuropsych measure.
function gameDigitSymbol() {
  const area = document.getElementById('game-area');
  const symbols=['◆','●','▲','■','★','♦','◇','▼','○'];
  let phase='ready',correct=0,total=0,timeLeft=60,currentDigit=0,intv=null;

  function draw(){
    if(phase==='ready'){
      area.innerHTML=`<div class="text-center" style="padding:28px 0"><div style="font-size:44px;margin-bottom:14px">🔢</div><div style="font-size:16px;font-weight:600;margin-bottom:6px">Symbol Match</div><div style="font-size:13px;color:var(--dim);margin-bottom:24px;line-height:1.6">Each number (1-9) has a matching symbol.<br>Use the key to tap the correct symbol.<br>Match as many as you can in 60 seconds.</div><button class="btn" id="ds-start">Start</button></div>`;
      document.getElementById('ds-start')?.addEventListener('click',()=>{phase='play';currentDigit=Math.floor(Math.random()*9)+1;startTimer();drawPlay();});
    }
  }

  function startTimer(){
    intv=setInterval(()=>{
      timeLeft--;
      const tEl=document.getElementById('ds-timer');
      const pEl=document.getElementById('ds-prog');
      if(tEl)tEl.textContent=timeLeft+'s';
      if(pEl)pEl.style.width=((60-timeLeft)/60*100)+'%';
      if(timeLeft<=0){clearInterval(intv);
        const score=Math.min(100,Math.round((correct/Math.max(1,total))*100*(1+correct/30)));
        taskComplete('digitSymbol',score);
      }
    },1000);
  }

  function drawPlay(){
    const keyHtml=symbols.map((s,i)=>`<div style="text-align:center;font-size:10px"><div style="font-size:18px;font-weight:700;color:var(--text)">${s}</div><div style="color:var(--dim);font-weight:600">${i+1}</div></div>`).join('');
    const btnColors=['#ef4444','#3b82f6','#22c55e','#eab308','#8b5cf6','#ec4899','#f97316','#06b6d4','#6366f1'];
    area.innerHTML=`<div class="text-center">
      <div class="flex-between mb-8"><span style="font-size:12px;color:var(--dim)">Matched: ${correct}</span><span id="ds-timer" style="font-size:13px;color:${timeLeft<=10?'var(--danger)':'var(--accent)'};font-weight:700">${timeLeft}s</span></div>
      <div class="progress"><div class="progress-fill" id="ds-prog" style="width:${(60-timeLeft)/60*100}%;background:var(--purple)"></div></div>
      <div style="display:flex;justify-content:space-between;padding:10px 6px;margin:16px 0 8px;background:var(--surface);border-radius:10px;border:1px solid var(--border)">${keyHtml}</div>
      <div style="font-size:14px;color:var(--dim);margin:12px 0 4px">Which symbol matches:</div>
      <div style="font-size:48px;font-weight:900;color:var(--accent);margin-bottom:16px">${currentDigit}</div>
      <div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center">
        ${symbols.map((s,i)=>`<button onclick="dsTap(${i+1})" style="width:62px;height:62px;border-radius:14px;border:2px solid rgba(255,255,255,0.15);background:${btnColors[i]};font-size:26px;cursor:pointer;transition:all 0.12s;color:#fff;font-weight:700;box-shadow:0 3px 12px ${btnColors[i]}40;user-select:none">${s}</button>`).join('')}
      </div>
    </div>`;
  }

  window.dsTap=function(num){
    total++;
    if(num===currentDigit)correct++;
    currentDigit=Math.floor(Math.random()*9)+1;
    drawPlay();
  };

  draw();
}

// ── CATEGORY FLUENCY (Language + Semantic Memory + Executive Function) ──
// Name as many items in a category as you can in 60 seconds. Typed input.
function gameFluency() {
  const area = document.getElementById('game-area');
  const categories=['Animals','Fruits','Countries','Tools','Vegetables','Sports','Musical Instruments','Clothing'];
  const category=categories[Math.floor(Math.random()*categories.length)];
  let phase='ready',timeLeft=60,words=[],intv=null;

  function draw(){
    if(phase==='ready'){
      area.innerHTML=`<div class="text-center" style="padding:28px 0"><div style="font-size:44px;margin-bottom:14px">💬</div><div style="font-size:16px;font-weight:600;margin-bottom:6px">Category Fluency</div><div style="font-size:13px;color:var(--dim);margin-bottom:24px;line-height:1.6">Name as many <strong style="color:var(--text)">${category}</strong> as you can<br>in 60 seconds. Type each one and press Enter.</div><button class="btn" id="flu-start">Start</button></div>`;
      document.getElementById('flu-start')?.addEventListener('click',()=>{phase='play';startTimer();drawPlay();});
    }
  }

  function startTimer(){
    intv=setInterval(()=>{
      timeLeft--;
      const tEl=document.getElementById('flu-timer');
      const pEl=document.getElementById('flu-prog');
      if(tEl){tEl.textContent=timeLeft+'s';tEl.style.color=timeLeft<=10?'var(--danger)':'var(--accent)';}
      if(pEl)pEl.style.width=((60-timeLeft)/60*100)+'%';
      if(timeLeft<=0){clearInterval(intv);finish();}
    },1000);
  }

  function drawPlay(){
    area.innerHTML=`<div class="text-center">
      <div class="flex-between mb-8"><span style="font-size:12px;color:var(--dim)">Category: <strong style="color:var(--text)">${category}</strong></span><span id="flu-timer" style="font-size:13px;color:var(--accent);font-weight:700">${timeLeft}s</span></div>
      <div class="progress"><div class="progress-fill" id="flu-prog" style="width:${(60-timeLeft)/60*100}%;background:var(--success)"></div></div>
      <div style="margin:16px 0 8px">
        <input class="input" id="flu-input" placeholder="Type a ${category.toLowerCase().slice(0,-1)}..." autofocus style="text-align:center;font-size:16px">
      </div>
      <div style="font-size:24px;font-weight:800;color:var(--accent);margin:8px 0">${words.length}</div>
      <div style="font-size:11px;color:var(--dim);margin-bottom:10px">words entered</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-height:100px;overflow-y:auto">
        ${words.map(w=>`<span style="padding:4px 10px;border-radius:6px;background:var(--surface);border:1px solid var(--border);font-size:12px">${w}</span>`).join('')}
      </div>
    </div>`;
    const inp=document.getElementById('flu-input');
    inp?.addEventListener('keydown',e=>{
      if(e.key==='Enter'){
        const w=inp.value.trim().toLowerCase();
        if(w&&!words.includes(w)){words.push(w);drawPlay();}
        else{inp.value='';inp.focus();}
      }
    });
    inp?.focus();
  }

  function finish(){
    // Normative: healthy adults produce ~18-22 animals/min. MCI ~12-15.
    // Score: map word count to 0-100 scale
    const count=words.length;
    const unique=new Set(words.map(w=>w.toLowerCase())).size;
    const score=Math.min(100,Math.round((unique/22)*100));
    taskComplete('fluency',score);
  }

  draw();
}

  const area = document.getElementById('game-area');
  if (!area) return;
  const ss = state.session;
  const comp = computeComposite(ss.scores);
  area.innerHTML = `<div class="text-center">
    <div style="font-size:40px;margin-bottom:12px">✨</div>
    <div style="font-size:18px;font-weight:700;margin-bottom:4px">Session Complete!</div>
    <div style="font-size:12px;color:var(--dim);margin-bottom:20px">Saving results...</div>
    <div style="font-size:48px;font-weight:900;color:var(--accent);margin-bottom:16px">${comp}</div>
    <div class="grid-2">
      ${TASKS.map(t => `<div class="score-mini"><div class="score-mini-label" style="color:${DOMAIN[t.id].color}">${t.icon} ${t.name}</div><div class="score-mini-val">${ss.scores[t.id]!=null?ss.scores[t.id].toFixed(1):'—'}</div></div>`).join('')}
    </div>
  </div>`;

  // Save to self-test history
  const result = {
    ...ss.scores, composite: comp,
    date: new Date().toISOString().slice(0,10),
    time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}),
    session: (data.sessions||[]).length + 1
  };
  data.sessions = [...(data.sessions||[]), result];
  SELF.save(data);
  setTimeout(() => { state.session=null; state.view='selfhome'; render(); }, 2800);
}

// Unified taskComplete — routes to correct view based on mode
function taskComplete(taskId, score) {
  state.session.scores[taskId] = Math.round(score * 10) / 10;
  state.session.taskIdx++;
  if (state.view === 'selftest') {
    setTimeout(() => { state.view='selftest'; render(); }, 500);
  } else {
    setTimeout(() => navigate('session', state.activeId), 500);
  }
}

function exportSelfData() {
  const data = SELF.load();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'neurotrack_selftest_' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(url);
}

function showSelfClearModal() {
  const ov = document.createElement('div'); ov.className='modal-overlay'; ov.onclick=()=>ov.remove();
  ov.innerHTML=`<div class="modal-box card text-center" onclick="event.stopPropagation()">
    <div style="font-size:28px;margin-bottom:12px">🗑️</div>
    <div style="font-size:16px;font-weight:700;margin-bottom:6px;color:var(--danger)">Clear Self-Test Data?</div>
    <div style="font-size:13px;color:var(--dim);margin-bottom:16px;line-height:1.6">This deletes all your self-test sessions and scores. This cannot be undone.</div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost" style="flex:1" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="btn btn-danger" style="flex:1" onclick="SELF.clear();this.closest('.modal-overlay').remove();state.view='selfhome';render()">Clear All</button>
    </div></div>`;
  document.body.appendChild(ov);
}

/* ════════════════════════════════════════════════════════════════════
   PARALLAX & SCROLL ANIMATION ENGINE
   ════════════════════════════════════════════════════════════════════ */

// Floating background orbs that move with scroll
(function initParallaxBg(){
  const bg=document.createElement('div');
  bg.className='parallax-bg';
  bg.id='parallax-bg';
  const orbs=[
    {x:15,y:20,size:300,color:'var(--accent)',speed:0.03},
    {x:75,y:10,size:250,color:'var(--purple)',speed:0.05},
    {x:50,y:60,size:350,color:'var(--cyan)',speed:0.02},
    {x:85,y:70,size:200,color:'var(--success)',speed:0.04},
    {x:25,y:80,size:280,color:'var(--warning)',speed:0.035},
  ];
  orbs.forEach((o,i)=>{
    const el=document.createElement('div');
    el.className='parallax-orb';
    el.id='orb-'+i;
    el.style.cssText=`left:${o.x}%;top:${o.y}%;width:${o.size}px;height:${o.size}px;background:${o.color}`;
    bg.appendChild(el);
  });
  document.body.prepend(bg);

  // Move orbs on scroll at different speeds
  let ticking=false;
  window.addEventListener('scroll',()=>{
    if(!ticking){
      requestAnimationFrame(()=>{
        const sy=window.scrollY;
        orbs.forEach((o,i)=>{
          const el=document.getElementById('orb-'+i);
          if(el) el.style.transform=`translateY(${sy*o.speed*-60}px) translateX(${Math.sin(sy*0.002+i*1.5)*20}px)`;
        });
        ticking=false;
      });
      ticking=true;
    }
  },{passive:true});
})();

// IntersectionObserver for scroll-reveal
let _srObserver=null;

function initScrollReveal(){
  if(_srObserver) _srObserver.disconnect();

  _srObserver=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        e.target.classList.add('vis');
        _srObserver.unobserve(e.target);
      }
    });
  },{threshold:0.08,rootMargin:'0px 0px -40px 0px'});

  // Observe all scroll-reveal elements
  document.querySelectorAll('.sr').forEach(el=>_srObserver.observe(el));
}

// Auto-apply sr classes to known elements after render
function applyScrollRevealClasses(){
  const app=document.getElementById('app');
  if(!app) return;

  // Cards get depth layer 2 (mid)
  app.querySelectorAll('.card').forEach((el,i)=>{
    if(!el.classList.contains('sr')){
      el.classList.add('sr','sr-d2');
      el.style.transitionDelay=(i*0.04)+'s';
    }
  });

  // Patient rows get staggered depth 1 (fast, foreground)
  app.querySelectorAll('.patient-row').forEach((el,i)=>{
    if(!el.classList.contains('sr')){
      el.classList.add('sr','sr-d1');
      el.style.transitionDelay=(i*0.05)+'s';
    }
  });

  // Grid-auto children get stagger
  app.querySelectorAll('.grid-auto').forEach(grid=>{
    grid.classList.add('sr-stagger');
    grid.querySelectorAll('.card').forEach(el=>{
      el.classList.add('sr','sr-d1');
    });
  });

  // Log rows — light slide from left
  app.querySelectorAll('.log-row').forEach((el,i)=>{
    if(!el.classList.contains('sr')){
      el.classList.add('sr','sr-left');
      el.style.transitionDelay=(i*0.03)+'s';
    }
  });

  // Slope rows — slide from right
  app.querySelectorAll('.slope-row').forEach((el,i)=>{
    if(!el.classList.contains('sr')){
      el.classList.add('sr','sr-right');
      el.style.transitionDelay=(i*0.04)+'s';
    }
  });

  // Chart wraps — scale up (deep layer)
  app.querySelectorAll('.chart-wrap').forEach(el=>{
    if(!el.classList.contains('sr')){
      el.classList.add('sr','sr-scale');
    }
  });

  // Section titles
  app.querySelectorAll('.section-title').forEach(el=>{
    if(!el.classList.contains('sr')){
      el.classList.add('sr','sr-d1');
    }
  });

  // Score-mini cards
  app.querySelectorAll('.score-mini').forEach((el,i)=>{
    if(!el.classList.contains('sr')){
      el.classList.add('sr','sr-d1');
      el.style.transitionDelay=(i*0.04)+'s';
    }
  });

  // Badges
  app.querySelectorAll('.badge').forEach(el=>{
    if(!el.classList.contains('sr')){
      el.classList.add('sr','sr-d1');
    }
  });

  initScrollReveal();
}

// Patch render to auto-apply scroll animations after each view change
const _origRender=render;
render=async function(){
  await _origRender();
  // Small delay so DOM is fully painted before observing
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      applyScrollRevealClasses();
    });
  });
};

/* ════════════════════════════════════════════════════════════════════
   DISABLE AUTOCOMPLETE / TEXT SUGGESTIONS ON ALL INPUTS
   ════════════════════════════════════════════════════════════════════ */
function disableAutocomplete(root) {
  root.querySelectorAll('input,textarea').forEach(el => {
    el.setAttribute('autocomplete', 'off');
    el.setAttribute('autocorrect', 'off');
    el.setAttribute('autocapitalize', 'off');
    el.setAttribute('spellcheck', 'false');
  });
}
// Watch for new inputs added to the DOM
new MutationObserver(mutations => {
  for (const m of mutations) {
    for (const node of m.addedNodes) {
      if (node.nodeType === 1) disableAutocomplete(node.tagName === 'INPUT' || node.tagName === 'TEXTAREA' ? node.parentElement : node);
    }
  }
}).observe(document.body, { childList: true, subtree: true });

/* ════════════════════════════════════════════════════════════════════
   INIT
   ════════════════════════════════════════════════════════════════════ */
render();
</script>
